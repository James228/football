<form id="add-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label for="c-category" class="control-label col-xs-12 col-sm-2">{:__('Category')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="text" class="form-control" id="c-category" name="row[category]" value="" data-rule="required" placeholder="如: sporttery, jczq"/>
        </div>
    </div>
    <div class="form-group">
        <label for="c-code" class="control-label col-xs-12 col-sm-2">{:__('Code')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="text" class="form-control" id="c-code" name="row[code]" value="" data-rule="required" placeholder="如: 周二001"/>
        </div>
    </div>
    <div class="form-group">
        <label for="c-name" class="control-label col-xs-12 col-sm-2">{:__('Name')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="text" class="form-control" id="c-name" name="row[name]" value="" data-rule="required" placeholder="如: 中国VS泰国"/>
        </div>
    </div>
    <div class="form-group">
        <label for="c-description" class="control-label col-xs-12 col-sm-2">{:__('Description')}:</label>
        <div class="col-xs-12 col-sm-8">
            <textarea name="row[description]" id="c-description" cols="30" rows="3" class="form-control" placeholder="备注说明"></textarea>
        </div>
    </div>
    <div class="form-group">
        <label for="c-sort_order" class="control-label col-xs-12 col-sm-2">{:__('SortOrder')}:</label>
        <div class="col-xs-12 col-sm-4">
            <input type="number" class="form-control" id="c-sort_order" name="row[sort_order]" value="0" data-rule="required"/>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label>
        <div class="col-xs-12 col-sm-8">
            {:build_radios('row[status]', ['normal'=>__('Normal'), 'hidden'=>__('Hidden')], 'normal')}
        </div>
    </div>
    <div class="form-group hide layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>
